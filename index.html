<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cookie Vault</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkBg: '#0f172a',
                        cardBg: '#1e293b',
                        accent: '#38bdf8'
                    }
                }
            }
        }
    </script>
    <style>
        /* Custom scrollbar for better aesthetics */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
        .toast-enter { transform: translateY(100%); opacity: 0; }
        .toast-enter-active { transform: translateY(0); opacity: 1; transition: all 0.3s ease-out; }
        .toast-exit { transform: translateY(0); opacity: 1; }
        .toast-exit-active { transform: translateY(100%); opacity: 0; transition: all 0.3s ease-in; }
    </style>
</head>
<body class="bg-darkBg text-slate-200 font-sans min-h-screen p-6 pb-24 relative overflow-x-hidden">

    <div class="max-w-5xl mx-auto">
        <!-- Header -->
        <header class="text-center mb-10">
            <h1 class="text-4xl font-bold text-accent mb-2">
                <i class="fa-solid fa-cookie-bite mr-2"></i> Cookie Vault
            </h1>
            <p class="text-slate-400">Simpan dan kelola data cookie Anda dengan aman (Format .txt)</p>
        </header>

        <!-- Area Upload -->
        <div class="bg-cardBg border-2 border-dashed border-slate-600 rounded-xl p-8 text-center hover:border-accent transition-colors duration-300 mb-10 relative">
            <i class="fa-solid fa-cloud-arrow-up text-5xl text-slate-400 mb-4"></i>
            <h3 class="text-xl font-semibold mb-2">Unggah File Cookie</h3>
            <p class="text-slate-400 mb-6 text-sm">Pilih satu atau beberapa file .txt sekaligus</p>
            
            <label id="uploadLabel" class="bg-accent hover:bg-sky-400 text-slate-900 font-bold py-3 px-6 rounded-lg cursor-pointer transition-colors shadow-lg inline-flex items-center justify-center min-w-[200px]">
                <i class="fa-solid fa-folder-open mr-2"></i> Pilih File (.txt)
                <input type="file" id="fileInput" accept=".txt" multiple class="hidden">
            </label>
        </div>

        <!-- Statistik & Header Bagian -->
        <div id="sectionHeader" class="flex justify-between items-center mb-6 border-b border-slate-700 pb-4 h-12">
            <!-- Teks ini akan di-render secara dinamis oleh JavaScript -->
        </div>

        <!-- Kolom Pencarian -->
        <div class="mb-8 relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                <i class="fa-solid fa-magnifying-glass text-slate-400"></i>
            </div>
            <input type="text" id="searchInput" placeholder="Cari berdasarkan nama file..." class="block w-full pl-10 pr-3 py-3 border border-slate-600 rounded-xl leading-5 bg-cardBg text-slate-200 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-accent focus:border-accent sm:text-sm transition duration-150 ease-in-out shadow-sm">
        </div>

        <!-- Daftar Cookie -->
        <div id="cookieGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Kartu data akan muncul di sini via JavaScript -->
        </div>
        
        <div id="emptyState" class="hidden text-center py-20 flex-col items-center justify-center">
            <i id="emptyIcon" class="fa-solid fa-box-open text-6xl text-slate-600 mb-4"></i>
            <p id="emptyText" class="text-slate-400 text-lg">Belum ada data cookie yang tersimpan.</p>
        </div>
    </div>

    <!-- Action Bar (Melayang untuk Bulk Delete) -->
    <div id="actionBar" class="fixed bottom-0 left-0 right-0 bg-cardBg border-t border-slate-600 p-4 transform translate-y-full transition-transform duration-300 ease-in-out z-40 flex justify-center shadow-[0_-10px_40px_-15px_rgba(0,0,0,0.5)]">
        <div class="max-w-5xl w-full flex justify-between items-center px-6">
            <div class="flex items-center gap-3">
                <span class="bg-accent text-slate-900 w-8 h-8 rounded-full flex items-center justify-center font-bold text-sm" id="selectedCount">0</span>
                <span class="font-semibold">File Terpilih</span>
            </div>
            <div class="flex gap-3">
                <button onclick="clearSelection()" class="px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded-lg transition-colors font-medium text-sm">Batal</button>
                <button onclick="deleteSelected()" class="px-4 py-2 bg-red-500 hover:bg-red-600 text-white rounded-lg transition-colors shadow-lg font-medium text-sm flex items-center">
                    <i class="fa-solid fa-trash-can mr-2"></i> Hapus
                </button>
            </div>
        </div>
    </div>

    <!-- Modal Konfirmasi Kustom -->
    <div id="customModal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm hidden opacity-0 transition-opacity duration-300">
        <div class="bg-cardBg border border-slate-600 rounded-2xl p-6 max-w-sm w-full mx-4 shadow-2xl transform scale-95 transition-transform duration-300" id="modalContent">
            <div class="text-center mb-6">
                <div class="w-16 h-16 rounded-full bg-red-500/10 text-red-500 flex items-center justify-center mx-auto mb-4 text-3xl">
                    <i class="fa-solid fa-triangle-exclamation"></i>
                </div>
                <h3 class="text-xl font-bold mb-2">Konfirmasi Hapus</h3>
                <p class="text-slate-400 text-sm" id="modalMessage">Apakah Anda yakin ingin menghapus data ini?</p>
            </div>
            <div class="flex gap-3">
                <button onclick="closeModal()" class="flex-1 px-4 py-2.5 bg-slate-700 hover:bg-slate-600 rounded-xl transition-colors font-semibold">Batal</button>
                <button id="modalConfirmBtn" class="flex-1 px-4 py-2.5 bg-red-500 hover:bg-red-600 text-white rounded-xl transition-colors font-semibold shadow-lg shadow-red-500/20">Hapus</button>
            </div>
        </div>
    </div>

    <!-- Toast Notifikasi Kustom -->
    <div id="toastContainer" class="fixed bottom-6 right-6 z-50 flex flex-col gap-3 pointer-events-none"></div>

    <script>
        // ==========================================
        // 🔴 URL GOOGLE APPS SCRIPT
        // ==========================================
        const API_URL = 'https://script.google.com/macros/s/AKfycbzcUZw4F0Lxv-kP6A3kE60Sm6SxaEiPIdBLRzHRHWhZkYOZb2Cbml4aN1rZQ9FDmz4o/exec';
        
        let cookiesData = [];
        let currentCategory = null;
        let selectedFiles = new Set(); // Menyimpan ID file yang dicentang
        
        const fileInput = document.getElementById('fileInput');
        const uploadLabel = document.getElementById('uploadLabel');
        const cookieGrid = document.getElementById('cookieGrid');
        const emptyState = document.getElementById('emptyState');
        const sectionHeader = document.getElementById('sectionHeader');
        const searchInput = document.getElementById('searchInput');
        const actionBar = document.getElementById('actionBar');

        // --- SISTEM NOTIFIKASI (TOAST & MODAL) ---
        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            
            const icon = type === 'success' ? 'fa-check-circle text-green-400' : 
                         type === 'error' ? 'fa-circle-xmark text-red-400' : 'fa-info-circle text-accent';
            
            toast.className = `bg-cardBg border border-slate-700 shadow-2xl rounded-xl p-4 flex items-center gap-3 w-80 toast-enter pointer-events-auto`;
            toast.innerHTML = `
                <i class="fa-solid ${icon} text-xl"></i>
                <p class="text-sm font-medium flex-1">${message}</p>
            `;
            
            container.appendChild(toast);
            
            // Trigger animation
            requestAnimationFrame(() => {
                toast.classList.remove('toast-enter');
                toast.classList.add('toast-enter-active');
            });

            setTimeout(() => {
                toast.classList.remove('toast-enter-active');
                toast.classList.add('toast-exit-active');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        let currentConfirmAction = null;
        function showConfirm(message, actionCallback) {
            const modal = document.getElementById('customModal');
            const modalContent = document.getElementById('modalContent');
            document.getElementById('modalMessage').innerText = message;
            
            currentConfirmAction = actionCallback;
            
            modal.classList.remove('hidden');
            // Trigger reflow
            void modal.offsetWidth;
            modal.classList.remove('opacity-0');
            modalContent.classList.remove('scale-95');
        }

        function closeModal() {
            const modal = document.getElementById('customModal');
            const modalContent = document.getElementById('modalContent');
            
            modal.classList.add('opacity-0');
            modalContent.classList.add('scale-95');
            setTimeout(() => modal.classList.add('hidden'), 300);
            currentConfirmAction = null;
        }

        document.getElementById('modalConfirmBtn').addEventListener('click', () => {
            if (currentConfirmAction) currentConfirmAction();
            closeModal();
        });

        // Fungsi Deteksi Kategori Dinamis berdasarkan Nama File
        function getCategoryData(content, filename) {
            // Ambil huruf berurutan pertama sebelum angka/karakter khusus (misal: "chatgpt20.txt" -> "chatgpt")
            const match = filename.match(/^[a-zA-Z]+/);
            let rawCatName = match ? match[0] : 'Umum';
            
            // Format jadi huruf besar di awal (Capitalize)
            let catName = rawCatName.charAt(0).toUpperCase() + rawCatName.slice(1).toLowerCase();
            
            // Mapping ikon khusus untuk kategori yang sering dipakai
            const lowerName = catName.toLowerCase();
            if (lowerName === 'netflix') return { name: 'Netflix', icon: 'fa-brands fa-neos', color: 'text-red-500', bg: 'bg-red-500/10' };
            if (lowerName === 'youtube') return { name: 'YouTube', icon: 'fa-brands fa-youtube', color: 'text-red-600', bg: 'bg-red-600/10' };
            if (lowerName === 'facebook') return { name: 'Facebook', icon: 'fa-brands fa-facebook', color: 'text-blue-500', bg: 'bg-blue-500/10' };
            if (lowerName === 'google' || lowerName === 'gmail') return { name: 'Google', icon: 'fa-brands fa-google', color: 'text-yellow-500', bg: 'bg-yellow-500/10' };
            if (lowerName === 'spotify') return { name: 'Spotify', icon: 'fa-brands fa-spotify', color: 'text-green-500', bg: 'bg-green-500/10' };
            if (lowerName === 'chatgpt') return { name: 'ChatGPT', icon: 'fa-solid fa-robot', color: 'text-emerald-500', bg: 'bg-emerald-500/10' };
            
            // Ikon default untuk kategori lain hasil generate otomatis
            return { name: catName, icon: 'fa-solid fa-folder', color: 'text-accent', bg: 'bg-accent/10' };
        }

        function formatDate(date) {
            return new Intl.DateTimeFormat('id-ID', {
                day: '2-digit', month: 'short', year: 'numeric',
                hour: '2-digit', minute: '2-digit'
            }).format(new Date(date));
        }

        // AMBIL DATA DARI DATABASE (READ)
        async function fetchCookies() {
            sectionHeader.innerHTML = `<h2 class="text-xl font-semibold animate-pulse text-accent"><i class="fa-solid fa-circle-notch fa-spin mr-2"></i>Menghubungkan ke Database...</h2>`;
            cookieGrid.innerHTML = '';
            emptyState.classList.add('hidden');
            clearSelection(); // Reset pilihan saat reload data

            try {
                const res = await fetch(API_URL);
                if (!res.ok) throw new Error("Gagal mengambil data.");
                const data = await res.json();
                
                cookiesData = data.map(item => ({
                    id: item.id,
                    filename: item.filename,
                    content: item.content,
                    // Karena DB lama mungkin simpan catName, kita update otomatis pake fungsi dinamis
                    cat: getCategoryData(item.content, item.filename), 
                    date: item.uploadDate 
                }));
                
                renderData();
            } catch (error) {
                console.error("Fetch error:", error);
                sectionHeader.innerHTML = `<h2 class="text-xl font-semibold text-red-500"><i class="fa-solid fa-triangle-exclamation mr-2"></i>Database Error</h2>`;
                document.getElementById('emptyIcon').className = 'fa-solid fa-plug-circle-xmark text-6xl text-red-500/50 mb-4';
                document.getElementById('emptyText').innerHTML = `Gagal menghubungkan. <br><span class="text-sm">Pastikan script di-deploy "Anyone"</span>`;
                emptyState.classList.remove('hidden');
            }
        }

        // --- SISTEM PEMILIHAN (SELECTION) ---
        function toggleSelection(id) {
            if (selectedFiles.has(id)) {
                selectedFiles.delete(id);
            } else {
                selectedFiles.add(id);
            }
            updateActionBar();
            
            // Update UI checkbox di card
            const checkbox = document.getElementById(`check-${id}`);
            const card = document.getElementById(`card-${id}`);
            if (checkbox) {
                checkbox.checked = selectedFiles.has(id);
                if (checkbox.checked) card.classList.add('ring-2', 'ring-accent', 'bg-slate-800/50');
                else card.classList.remove('ring-2', 'ring-accent', 'bg-slate-800/50');
            }
        }

        function clearSelection() {
            selectedFiles.clear();
            updateActionBar();
            // Uncheck semua box
            document.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
            document.querySelectorAll('[id^="card-"]').forEach(card => card.classList.remove('ring-2', 'ring-accent', 'bg-slate-800/50'));
        }

        function updateActionBar() {
            document.getElementById('selectedCount').innerText = selectedFiles.size;
            if (selectedFiles.size > 0) {
                actionBar.classList.remove('translate-y-full');
            } else {
                actionBar.classList.add('translate-y-full');
            }
        }

        // --- SISTEM HAPUS (DELETE) ---
        // Hapus Single File
        function deleteSingle(id, filename) {
            showConfirm(`Hapus file "${filename}"?`, () => processDelete([id]));
        }

        // Hapus Terpilih (Bulk Delete)
        function deleteSelected() {
            showConfirm(`Hapus ${selectedFiles.size} file yang dipilih?`, () => {
                processDelete(Array.from(selectedFiles));
                clearSelection();
            });
        }

        // Hapus Kategori (Seluruh file dalam folder)
        function deleteCategoryFolder(catName) {
            const filesInCat = cookiesData.filter(c => c.cat.name === catName).map(c => c.id);
            showConfirm(`PERINGATAN: Hapus semua ${filesInCat.length} file di folder "${catName}"?`, () => {
                currentCategory = null; // Kembali ke beranda setelah hapus
                processDelete(filesInCat);
            });
        }

        // Engine Penghapus Data ke Server (Antrean Sekuensial)
        async function processDelete(idsArray) {
            sectionHeader.innerHTML = `<h2 class="text-xl font-semibold animate-pulse text-red-400"><i class="fa-solid fa-trash-can mr-2"></i>Menghapus ${idsArray.length} data...</h2>`;
            
            let successCount = 0;
            for (const id of idsArray) {
                try {
                    await fetch(API_URL, {
                        method: 'POST',
                        body: JSON.stringify({ action: 'delete', id: id })
                    });
                    successCount++;
                    // Hapus dari state lokal sementara agar UI cepat update
                    cookiesData = cookiesData.filter(c => c.id !== id);
                } catch (error) {
                    console.error("Gagal hapus ID:", id);
                }
            }
            
            showToast(`Berhasil menghapus ${successCount} data.`);
            renderData(); // Render ulang dari state lokal, lalu fetch ulang untuk sinkronisasi
            fetchCookies(); 
        }

        // --- SALIN ISI (COPY UTUH) ---
        function copyContent(id) {
            // Cari data asli dari array berdasarkan ID
            const cookieObj = cookiesData.find(c => String(c.id) === String(id));
            
            if (!cookieObj) {
                showToast("Error: Data tidak ditemukan di memori.", "error");
                return;
            }

            const textToCopy = cookieObj.content;

            // Metode modern
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(textToCopy).then(() => {
                    showToast("Isi file berhasil disalin utuh!");
                }).catch(() => fallbackCopyTextToClipboard(textToCopy));
            } else {
                // Metode Fallback
                fallbackCopyTextToClipboard(textToCopy);
            }
        }

        function fallbackCopyTextToClipboard(text) {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.position = "fixed";  // Hindari scrolling ke bawah
            textArea.style.top = "0";
            textArea.style.left = "0";
            textArea.style.opacity = "0";
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();

            try {
                const successful = document.execCommand('copy');
                if (successful) showToast("Isi file berhasil disalin utuh!");
                else showToast("Gagal menyalin, browser memblokir akses.", "error");
            } catch (err) {
                showToast("Error saat menyalin teks.", "error");
            }
            document.body.removeChild(textArea);
        }

        // --- NAVIGASI & RENDER UTAMA ---
        function viewCategory(catName) {
            currentCategory = catName;
            searchInput.value = ''; 
            clearSelection();
            renderData();
        }

        function goBack() {
            currentCategory = null;
            clearSelection();
            renderData();
        }

        function renderData(searchTerm = '') {
            cookieGrid.innerHTML = '';
            document.getElementById('emptyIcon').className = 'fa-solid fa-box-open text-6xl text-slate-600 mb-4';
            
            // 1. PENCARIAN
            if (searchTerm !== '') {
                const searchStr = searchTerm.toLowerCase();
                const filteredData = cookiesData.filter(cookie => 
                    cookie.filename.toLowerCase().includes(searchStr) || 
                    cookie.cat.name.toLowerCase().includes(searchStr)
                );

                sectionHeader.innerHTML = `
                    <h2 class="text-2xl font-semibold"><i class="fa-solid fa-search mr-2"></i> Pencarian</h2>
                    <span class="bg-slate-700 px-3 py-1 rounded-full text-sm font-medium">${filteredData.length} Hasil</span>
                `;

                if (filteredData.length === 0) {
                    emptyState.classList.remove('hidden');
                    document.getElementById('emptyText').innerHTML = `Tidak ada hasil untuk "${searchTerm}".`;
                } else {
                    emptyState.classList.add('hidden');
                    renderCards(filteredData);
                }
                return; 
            }

            // 2. TAMPILAN FOLDER (KATEGORI)
            if (currentCategory === null) {
                sectionHeader.innerHTML = `
                    <h2 class="text-2xl font-semibold flex items-center"><i class="fa-solid fa-layer-group text-accent mr-3"></i> Kategori</h2>
                    <span class="bg-slate-700 px-3 py-1 rounded-full text-sm font-medium">Total: ${cookiesData.length} File</span>
                `;

                if (cookiesData.length === 0) {
                    emptyState.classList.remove('hidden');
                    document.getElementById('emptyText').innerHTML = `Belum ada data cookie yang tersimpan.`;
                    return;
                }

                emptyState.classList.add('hidden');
                
                const categories = {};
                cookiesData.forEach(item => {
                    const catName = item.cat.name;
                    if (!categories[catName]) {
                        categories[catName] = { info: item.cat, count: 0 };
                    }
                    categories[catName].count++;
                });

                Object.keys(categories).forEach(catName => {
                    const cat = categories[catName];
                    const card = document.createElement('div');
                    card.setAttribute('onclick', `viewCategory('${catName}')`);
                    card.className = 'cursor-pointer bg-cardBg rounded-xl p-6 shadow-lg border border-slate-700 flex items-center justify-between transition-all duration-300 hover:border-accent hover:shadow-xl hover:-translate-y-1 group';
                    card.innerHTML = `
                        <div class="flex items-center gap-5">
                            <div class="w-14 h-14 rounded-full flex items-center justify-center text-3xl ${cat.info.bg} ${cat.info.color} group-hover:scale-110 transition-transform">
                                <i class="${cat.info.icon}"></i>
                            </div>
                            <div>
                                <h3 class="font-bold text-xl">${catName}</h3>
                                <p class="text-sm text-slate-400 mt-1">${cat.count} File Tersimpan</p>
                            </div>
                        </div>
                        <i class="fa-solid fa-chevron-right text-slate-500 text-xl group-hover:text-accent transition-colors"></i>
                    `;
                    cookieGrid.appendChild(card);
                });
            } 
            // 3. DALAM FOLDER KATEGORI
            else {
                const categoryItems = cookiesData.filter(item => item.cat.name === currentCategory);
                if (categoryItems.length === 0) {
                    goBack(); return;
                }

                // Render Header dgn Tombol Hapus Kategori
                sectionHeader.innerHTML = `
                    <div class="flex items-center gap-4">
                        <button onclick="goBack()" class="bg-slate-700 hover:bg-slate-600 w-10 h-10 rounded-lg flex items-center justify-center transition-colors shadow-md" title="Kembali">
                            <i class="fa-solid fa-arrow-left"></i>
                        </button>
                        <h2 class="text-2xl font-semibold flex items-center"><i class="fa-regular fa-folder-open text-accent mr-3"></i> ${currentCategory}</h2>
                    </div>
                    <div class="flex items-center gap-3">
                        <span class="bg-slate-700 px-3 py-1 rounded-full text-sm font-medium mr-2">${categoryItems.length} File</span>
                        <button onclick="deleteCategoryFolder('${currentCategory}')" class="bg-red-500/10 hover:bg-red-500 text-red-500 hover:text-white px-3 py-1.5 rounded-lg text-sm font-semibold transition-colors flex items-center">
                            <i class="fa-solid fa-trash mr-2"></i> Kosongkan
                        </button>
                    </div>
                `;
                
                emptyState.classList.add('hidden');
                renderCards(categoryItems);
            }
        }

        function renderCards(dataArray) {
            dataArray.forEach(cookie => {
                const card = document.createElement('div');
                const isSelected = selectedFiles.has(cookie.id);
                
                card.id = `card-${cookie.id}`;
                card.className = `bg-cardBg rounded-xl p-5 shadow-lg border border-slate-700 flex flex-col transition duration-300 relative group ${isSelected ? 'ring-2 ring-accent bg-slate-800/50' : 'hover:border-slate-500'}`;
                
                // Hindari XSS pada tampilan nama
                const safeName = cookie.filename.replace(/</g, "&lt;").replace(/>/g, "&gt;");

                card.innerHTML = `
                    <!-- Checkbox Area -->
                    <div class="absolute top-4 right-4 z-10">
                        <input type="checkbox" id="check-${cookie.id}" class="w-5 h-5 accent-accent cursor-pointer rounded bg-slate-700 border-slate-500" 
                            ${isSelected ? 'checked' : ''} onclick="toggleSelection('${cookie.id}')">
                    </div>

                    <div class="flex items-center gap-4 mb-4 pr-8" onclick="toggleSelection('${cookie.id}')" style="cursor:pointer;">
                        <div class="w-12 h-12 rounded-lg flex items-center justify-center text-2xl shrink-0 ${cookie.cat.bg} ${cookie.cat.color}">
                            <i class="${cookie.cat.icon}"></i>
                        </div>
                        <div class="flex-1 overflow-hidden">
                            <h3 class="font-bold text-lg truncate" title="${safeName}">${safeName}</h3>
                            <span class="text-xs font-semibold px-2 py-0.5 rounded-full ${cookie.cat.bg} ${cookie.cat.color} border border-current inline-block mt-1">
                                ${cookie.cat.name}
                            </span>
                        </div>
                    </div>
                    
                    <div class="mt-auto pt-4 border-t border-slate-700/50 flex items-center justify-between">
                        <div class="text-xs text-slate-400">
                            <i class="fa-regular fa-calendar mr-1"></i> ${cookie.date}
                        </div>
                        <div class="flex gap-2 relative z-20">
                            <button onclick="copyContent('${cookie.id}')" class="w-8 h-8 rounded bg-slate-700 hover:bg-accent hover:text-slate-900 flex items-center justify-center transition-colors tooltip" title="Salin Isi">
                                <i class="fa-regular fa-copy"></i>
                            </button>
                            <button onclick="deleteSingle('${cookie.id}', '${safeName.replace(/'/g, "\\'")}')" class="w-8 h-8 rounded bg-slate-700 hover:bg-red-500 hover:text-white flex items-center justify-center transition-colors" title="Hapus">
                                <i class="fa-solid fa-trash-can"></i>
                            </button>
                        </div>
                    </div>
                `;
                cookieGrid.appendChild(card);
            });
        }

        searchInput.addEventListener('input', (e) => renderData(e.target.value));

        // --- TAMBAH DATA (BULK UPLOAD) ---
        fileInput.addEventListener('change', async (e) => {
            const files = e.target.files;
            if (!files || files.length === 0) return;

            const originalHTML = uploadLabel.innerHTML;
            uploadLabel.style.pointerEvents = 'none';
            uploadLabel.classList.remove('hover:bg-sky-400');

            let successCount = 0;
            let failCount = 0;

            try {
                // Loop satu per satu untuk mencegah server Google Apps Script menolak request (Rate Limit)
                for (let i = 0; i < files.length; i++) {
                    const file = files[i];
                    
                    // Update UI Progress
                    uploadLabel.innerHTML = `<i class="fa-solid fa-circle-notch fa-spin mr-2"></i> Mengunggah (${i + 1}/${files.length})...`;
                    
                    const text = await file.text();
                    const category = getCategoryData(text, file.name);
                    
                    const payload = {
                        action: 'insert',
                        id: 'UID-' + Date.now() + Math.random().toString(36).substring(2, 6),
                        filename: file.name,
                        content: text,
                        category: category.name,
                        iconClass: category.icon,
                        uploadDate: formatDate(new Date())
                    };
                    
                    const response = await fetch(API_URL, {
                        method: 'POST',
                        body: JSON.stringify(payload)
                    });

                    if (response.ok) {
                        successCount++;
                    } else {
                        failCount++;
                    }
                }
            } catch (error) {
                console.error("Upload error:", error);
                showToast("Koneksi terputus saat mengunggah file.", "error");
            } finally {
                // Selalu Reset UI & Input meskipun terjadi error
                uploadLabel.innerHTML = originalHTML;
                uploadLabel.style.pointerEvents = 'auto';
                uploadLabel.classList.add('hover:bg-sky-400');
                fileInput.value = ''; // Reset file input agar bisa upload file yang sama lagi
                
                if (successCount > 0) {
                    let msg = `Berhasil mengunggah ${successCount} file.`;
                    if (failCount > 0) msg += ` (${failCount} gagal)`;
                    showToast(msg, 'success');
                    
                    currentCategory = null; 
                    searchInput.value = '';
                    fetchCookies(); // Muat ulang data terbaru
                } else if (failCount > 0) {
                    showToast("Gagal mengunggah file.", "error");
                }
            }
        });

        // Initialize
        fetchCookies();
    </script>
</body>
</html>
